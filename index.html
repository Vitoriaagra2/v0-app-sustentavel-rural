<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>EcoRural - Sustentabilidade Rural</title>
    <meta name="description" content="Avalie e melhore a sustentabilidade da sua propriedade rural com recomendações personalizadas"/>
    <link rel="stylesheet" href="estilo.css"/>
</head>
<body>

    <div class="fundo-decorativo">
        <div class="circulo circulo-topo"></div>
        <div class="circulo circulo-baixo"></div>
    </div>

    <div class="conteiner-principal">
        <div class="cartao-login">
            
            <div class="cabecalho-cartao">
                <div class="icone-folha-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icone-folha">
                        <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path>
                        <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="titulo-cartao">Bem-vindo de volta</h1>
                    <p class="subtitulo-cartao">Entre para acessar seu painel de sustentabilidade</p>
                </div>
            </div>

            <div class="conteudo-cartao">
                <form id="form-login" class="formulario">
                    
                    <div class="grupo-campo">
                        <label for="email" class="rotulo-campo">E-mail</label>
                        <input class="input-texto" id="email" placeholder="seu@email.com" required type="email">
                    </div>

                    <div class="grupo-campo">
                        <label for="password" class="rotulo-campo">Senha</label>
                        <div class="campo-senha-wrapper">
                            <input class="input-texto" id="password" placeholder="Sua senha" required type="password">
                            <button type="button" id="btn-mostrar-senha" class="btn-icone" aria-label="Mostrar senha">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icone-olho">
                                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button class="btn-enviar" type="submit">Entrar</button>
                </form>

                <div class="rodape-cartao">
                    <button type="button" class="btn-link">
                        Ainda não tem conta? <span class="destaque-verde">Cadastre-se</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
